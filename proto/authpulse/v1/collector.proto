syntax = "proto3";

package authpulse.v1.collector;

service CollectorService {
  rpc IngestEvent(IngestEventRequest) returns (IngestEventResponse);
}

message IngestEventRequest {
  string tenant_id = 1;
  string user_id = 2;
  string service = 3;
  string resource = 4;
  string action = 5;
  int32 decision = 6;
  string reason_code = 7;
  uint64 latency_ms = 8;
  string source_ip = 9;
  string trace_id = 10;
  int64 timestamp_unix_ms = 11;
}

message IngestEventResponse {
  string event_id = 1;
  int64 recorded_at_unix_ms = 2;
}

enum Decision {
  DECISION_UNSPECIFIED = 0;
  DECISION_ALLOW = 1;
  DECISION_DENY = 2;
}
