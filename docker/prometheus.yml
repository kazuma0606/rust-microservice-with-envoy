global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "authpulse-collector"
    static_configs:
      - targets: ["collector:9091"]
    metrics_path: "/metrics"

  - job_name: "authpulse-aggregator"
    static_configs:
      - targets: ["aggregator:9092"]
    metrics_path: "/metrics"

  - job_name: "envoy"
    static_configs:
      - targets: ["envoy:9901"]
    metrics_path: "/stats/prometheus"
