static_resources:
  listeners:
    - name: authpulse_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: authpulse_proxy
                route_config:
                  name: authpulse_routes
                  virtual_hosts:
                    - name: authpulse_backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/authpulse.v1.collector"
                          route:
                            cluster: collector_backend
                            timeout: 10s
                        - match:
                            prefix: "/authpulse.v1.aggregator"
                          route:
                            cluster: aggregator_backend
                            timeout: 30s
                http_filters:
                  # Rate limiting (uncomment to enable — Rust code unchanged)
                  # - name: envoy.filters.http.local_ratelimit
                  #   typed_config:
                  #     "@type": type.googleapis.com/envoy.extensions.filters.http.local_rate_limit.v3.LocalRateLimit
                  #     stat_prefix: rate_limit
                  #     token_bucket:
                  #       max_tokens: 1000
                  #       tokens_per_fill: 100
                  #       fill_interval: 1s
                  #     filter_enabled:
                  #       runtime_key: local_rate_limit_enabled
                  #       default_value:
                  #         numerator: 100
                  #         denominator: HUNDRED

                  # JWT verification (uncomment to enable — Rust code unchanged)
                  # - name: envoy.filters.http.jwt_authn
                  #   typed_config:
                  #     "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                  #     providers:
                  #       authpulse_provider:
                  #         issuer: "https://your-auth-provider"
                  #         remote_jwks:
                  #           http_uri:
                  #             uri: "https://your-auth-provider/.well-known/jwks.json"
                  #             cluster: jwks_cluster
                  #             timeout: 5s

                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: collector_backend
      type: STRICT_DNS
      connect_timeout: 5s
      load_assignment:
        cluster_name: collector_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: collector
                      port_value: 50051
      http2_protocol_options: {}

    - name: aggregator_backend
      type: STRICT_DNS
      connect_timeout: 5s
      load_assignment:
        cluster_name: aggregator_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: aggregator
                      port_value: 50052
      http2_protocol_options: {}
